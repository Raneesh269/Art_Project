<!DOCTYPE html>
<html>
<head>
<title>My Art World</title>
<style>

 .modal{
    display:none;
    position:fixed;
    z-index:1;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background-color:rgba(0,0,0,0.9);

    justify-content:center;
    align-items:center;
}
.modal-content{
    max-width:90%;
    max-height:90%;
    width:auto;
    height:auto;
}

.close{
    position:absolute;
    top:20px;
    right:35px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}

header{
    background:black;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#333;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:15px;
    text-decoration:none;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.gallery img{
    width:200px;
    margin:10px;
    border-radius:10px;
    transition: transform 0.3s;
}

.gallery img:hover{
    transform: scale(1.1);
}
</style>

</head>

<div id="imageModal" class="modal">
  <span class="close">&times;</span>
  <img class="modal-content" id="fullImage">
</div>

<body>

<header>
<h1>RRR Art Gallery 🎨</h1>
<p>Creative Digital & Handmade Art</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Gallery</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<section class="gallery">
<img src="art1.jpg">
<img src="art2.jpg">
<img src="art3.jpg">
<img src="art4.jpg">
</section>

<script>
let modal = document.getElementById("imageModal");
let modalImg = document.getElementById("fullImage");

document.querySelectorAll(".gallery img").forEach(img => {
    img.onclick = function(){
        modal.style.display = "flex";
        modalImg.src = this.src;
    }
});

document.querySelector(".close").onclick = function(){
    modal.style.display = "none";
}
</script>
</body>
</html>
